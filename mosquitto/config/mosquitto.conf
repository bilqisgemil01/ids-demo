# Mosquitto MQTT Broker Configuration

# Listener - listen on port 1883
listener 1883

# Allow anonymous connections
allow_anonymous true

# Log destination - write logs to file in mosquitto/log
log_dest file mosquitto/log/mosquitto.log

# Log types to include connection activity
log_type error
log_type warning
log_type notice
log_type information
log_type subscribe
log_type unsubscribe

