services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/data:/mosquitto/data
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    restart: unless-stopped
  publisher:
    image: efrecon/mqtt-client
    container_name: publisher
    depends_on:
      mosquitto:
        condition: service_started
    command: >
      sh -c 'while true; do
        mosquitto_pub -h mosquitto -t "test/topic" -m "Hello from publisher" -i publisher1;
        sleep 1;
      done'
  subscriber:
    image: efrecon/mqtt-client
    container_name: subscriber
    depends_on: 
      mosquitto: 
        condition: service_started
    command: >
      sh -c 'mosquitto_sub -h mosquitto -t "test/#" -v'

  attacker:
    image: efrecon/mqtt-client
    container_name: attacker
    depends_on: 
      mosquitto:
        condition: service_started
    command: > 
      sh -c 'sleep 3;
      echo "Attacker ready. Run: docker exec -it attacker sh";
      tail -f /dev/null'
    # Attack 1: burst flood
    # docker exec -it attacker sh -c 'for i in $(seq 1 300); do mosquitto_pub -h mosquitto -t "attack/flood" -m "x$i" -i attacker1; done'
    # Attack 2: publish to restricted topic
    # docker exec -it attacker sh -c 'mosquitto_pub -h mosquitto -t "admin/commands" -m "reboot" -i attacker1'