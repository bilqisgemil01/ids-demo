services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/log:/mosquitto/log
      - ./mosquitto/data:/mosquitto/data
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    restart: unless-stopped
  publisher:
    image: efrecon/mqtt-client
    container_name: publisher
    depends_on:
      mosquitto:
        condition: service_started
    command: >
      sh -c 'while true; do
        echo "Hello from publisher $(date -Iseconds)";
        sleep 10;
      done | mosquitto_pub -h mosquitto -t "test/topic" -l -i publisher1'
  subscriber:
    image: efrecon/mqtt-client
    container_name: subscriber
    depends_on: 
      mosquitto: 
        condition: service_started
    command: >
      sh -c 'mosquitto_sub -h mosquitto -t "test/#" -v -i subscriber1'

  attacker:
    image: efrecon/mqtt-client
    container_name: attacker
    depends_on: 
      mosquitto:
        condition: service_started
    command: > 
      sh -c 'sleep 3;
      echo "Attacker ready. Run: docker exec -it attacker sh";
      tail -f /dev/null'
    # Attack A: Connection churn
    # -> Small burst:
    # docker exec -it attacker sh -c "i=1; while [ $i -le 10 ]; do mosquitto_pub -h mosquitto -t attack/churn -m x$i -i attacker1; i=$((i+1)); done"
    # -> Big burst: 
    # docker exec -it attacker sh -c "i=1; while [ $i -le 50 ]; do mosquitto_pub -h mosquitto -t attack/churn -m x$i -i attacker1; i=$((i+1)); done"
    # Attack B: Message-rate flood
    # docker exec -it attacker sh -c "i=1; while [ $i -le 200 ]; do echo x$i; i=$((i+1)); done | mosquitto_pub -h mosquitto -t attack/msgflood -l -i attacker_persist"

  attack_observer:
    image: efrecon/mqtt-client
    container_name: attack_observer
    depends_on:
      mosquitto:
        condition: service_started
    command: >
      sh -c 'mosquitto_sub -h mosquitto -t "attack/#" -v -i attack_observer1'

  ids: 
    build: ./services/ids 
    container_name: ids 
    depends_on: 
      mosquitto: 
        condition: service_started 
    environment: 
      # Input A: broker log (connection churn)
      LOG_PATH: /evidence/mosquitto.log
      # Input B: MQTT subscription (message-rate flood)
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_TOPIC: "attack/msgflood"

      ALERT_DIR: /alerts

      # Churn rule parameters
      CHURN_WINDOW_SEC: "5"
      CHURN_THRESHOLD: "20"
      SHORT_SESSION_SEC: "2"

      # Message-flood rule parameters
      MSG_WINDOW_SEC: "5"
      MSG_THRESHOLD: "100"

      COOLDOWN_SEC: "10"
    volumes: 
      - ./mosquitto/log:/evidence:ro 
      - ./alerts:/alerts
    restart: unless-stopped